Código de la clase de actividad SCIAN:
  Descripción: La clasificación de las actividades desarrolladas por las unidades
    económicas debe hacerse utilizando el SCIAN y sus actualizaciones, con base en
    lo dispuesto en el acuerdo para el uso del SCIAN y en la recopilación, análisis
    y presentación de estadísticas económicas, publicado en el Diario Oficial de la
    Federación del 10 de julio de 2009. El código está asignado con base en la actividad
    principal que desarrolla la unidad económica y de acuerdo con el Sistema de Clasificación
    Industrial para América del Norte, versión 2018. Para la asignación del código
    de actividad correspondiente, según el SCIAN 2018, se consideraron tanto los productos
    (bienes y servicios) desarrollados por el establecimiento como sus procesos de
    producción.
  Tipo: alfanumérico
  Longitud: '6'
