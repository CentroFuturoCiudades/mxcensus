numero_ext:
  Descripción: Son los valores numéricos que identifican a uno o varios inmuebles
    en una vialidad.
  Tipo: numérico
  Longitud: '7'
  Categorías: {}
letra_ext:
  Descripción: Son los caracteres alfanuméricos que identifican a uno o varios inmuebles
    en una vialidad.
  Tipo: alfanumérico
  Longitud: '35'
  Categorías: {}
edificio:
  Descripción: Es el sustantivo propio con el que se identifica el inmueble donde
    está ubicada la unidad económica.
  Tipo: alfanumérico
  Longitud: '35'
  Categorías: {}
edificio_e:
  Descripción: Es con el que se identifica el piso o nivel del inmueble donde está
    ubicada la unidad económica.
  Tipo: alfanumérico
  Longitud: '35'
  Categorías: {}
numero_int:
  Descripción: Son los valores numéricos que identifican el domicilio de la unidad
    económica al interior de un inmueble.
  Tipo: numérico
  Longitud: '7'
  Categorías: {}
letra_int:
  Descripción: Son los caracteres alfanuméricos que identifican un domicilio al interior
    de un inmueble.
  Tipo: alfanumérico
  Longitud: '35'
  Categorías: {}
tipo_asent:
  Descripción: Es la clasificación que se da al asentamiento humano de acuerdo con
    su función (colonia, fraccionamiento, unidad habitacional, etc.)
  Tipo: alfanumérico
  Longitud: '25'
  Categorías: {}
nomb_asent:
  Descripción: Es el sustantivo propio con el cual se identifica el asentamiento humano
    en el que se ubica la unidad económica.
  Tipo: alfanumérico
  Longitud: '75'
  Categorías: {}
tipoCenCom:
  Descripción: Tipo de plaza, centro comercial, etcétera donde se encuentra la unidad
    económica.
  Tipo: alfanumérico
  Longitud: '30'
  Categorías: {}
nom_CenCom:
  Descripción: Nombre de la plaza, centro comercial, etcétera donde se encuentra la
    unidad económica.
  Tipo: alfanumérico
  Longitud: '75'
  Categorías: {}
num_local:
  Descripción: Dato alfanumérico que corresponde al local en donde se localizó la
    unidad económica.
  Tipo: alfanumérico
  Longitud: '35'
  Categorías: {}
cod_postal:
  Descripción: Clave numérica integrada por cinco dígitos establecido por el Servicio
    Postal Mexicano.
  Tipo: alfanumérico
  Longitud: '5'
  Categorías: {}
cve_ent:
  Descripción: Clave que identifica a la entidad federativa estadística.
  Tipo: alfanumérico
  Longitud: '2'
  Categorías: {}
entidad:
  Descripción: Es el sustantivo propio que identifica a la entidad federativa.
  Tipo: alfanumérico
  Longitud: '40'
  Categorías: {}
cve_mun:
  Descripción: Clave que identifica al Municipio estadístico, y en el caso de la Ciudad
    de México, las que identifican a las Alcaldías.
  Tipo: alfanumérico
  Longitud: '3'
  Categorías: {}
municipio:
  Descripción: Es el sustantivo propio que identifica al Municipio, y en el caso de
    la Ciudad de México los que identifican a las Alcaldías.
  Tipo: alfanumérico
  Longitud: '100'
  Categorías: {}
cve_loc:
  Descripción: Clave que identifica a la localidad estadística. Esta es el lugar ocupado
    con una o más edificaciones utilizadas como viviendas, las cuales pueden estar
    habitadas o no, este lugar es reconocido por un nombre dado por alguna disposición
    legal o la costumbre.
  Tipo: alfanumérico
  Longitud: '4'
  Categorías: {}
localidad:
  Descripción: Es el sustantivo propio que identifica a la localidad. Esta es el lugar
    ocupado con una o más edificaciones utilizadas como viviendas, las cuales pueden
    estar habitadas o no, este lugar es reconocido por un nombre dado por alguna disposición
    legal o la costumbre.
  Tipo: alfanumérico
  Longitud: '100'
  Categorías: {}
ageb:
  Descripción: Es la extensión territorial que corresponde a la subdivisión de las
    AGEM. Constituye la unidad básica del Marco Geoestadístico Nacional y, dependiendo
    de sus características, se clasifica en dos tipos, Áreas Geoestadísticas Básicas
    Urbanas y Áreas Geoestadísticas Básicas Rurales.
  Tipo: alfanumérico
  Longitud: '4'
  Categorías: {}
manzana:
  Descripción: Clave geoestadística de la manzana, compuesta por tres dígitos, que
    identifica a una extensión territorial que está constituida por un grupo de viviendas,
    edificios, predios, lotes o terrenos de uso habitacional, comercial, industrial
    o de servicios.
  Tipo: alfanumérico
  Longitud: '3'
  Categorías: {}
telefono:
  Descripción: Número telefónico, secuencia de dígitos que permite la comunicación
    vía telefónica con la unidad económica.
  Tipo: alfanumérico
  Longitud: '20'
  Categorías: {}
correoelec:
  Descripción: Correo electrónico, es la serie de caracteres cuya finalidad es acceder
    a un servicio de red que posibilita a las unidades económicas el envío y recepción
    de mensajes mediante sistemas de comunicación electrónicos.
  Tipo: alfanumérico
  Longitud: '75'
  Categorías: {}
www:
  Descripción: Son los datos que permiten el acceso a información de la unidad económica
    en Internet.
  Tipo: alfanumérico
  Longitud: '75'
  Categorías: {}
tipoUniEco:
  Descripción: 'Grupo de categorías que sirve para identificar si el establecimiento
    es fijo o semifijo, bajo las siguientes definiciones: Establecimiento fijo: es
    la unidad que en una sola ubicación física, asentada en un lugar de manera permanente
    y delimitada por construcciones e instalaciones fijas, combina acciones y recursos
    bajo el control de una sola entidad propietaria o controladora para realizar alguna
    actividad económica con y sin fines de lucro, excepto las destinadas al autoconsumo.
    En este tipo de establecimiento están comprendidas las viviendas cuando en algún
    espacio de la casa-habitación, que también está destinado a otras actividades
    cotidianas, se realiza alguna actividad económica. Establecimiento semifijo: establecimientos
    que están fijos, enclavados en el suelo, y que permanecen de día y de noche en
    el mismo sitio aunque sus instalaciones sean frágiles o rústicas. También aquellas
    instalaciones que aun cuando no estén enclavadas al suelo no pueden ser removidas
    de donde están, aunque lleven a cabo actividades que tienen carácter temporal
    o estacional, siempre y cuando permanezcan activas y en un solo lugar durante
    un periodo de por lo menos tres meses seguidos.'
  Tipo: alfanumérico
  Longitud: '8'
  Categorías: {}
latitud:
  Descripción: Es la distancia que existe entre la unidad económica y el ecuador,
    medida sobre el meridiano que pasa por dicho punto.
  Tipo: numérico
  Longitud: '20'
  Categorías: {}
longitud:
  Descripción: Es la distancia que existe entre la unidad económica y el meridiano
    de Greenwich, medida sobre el paralelo que pasa por dicho punto.
  Tipo: numérico
  Longitud: '20'
  Categorías: {}
fecha_alta:
  Descripción: Fecha en la que la unidad económica se integró al Directorio Estadístico
    Nacional de Unidades Económicas y al Registro Estadístico de Negocios de México
    (RENEM).
  Tipo: alfanumérico
  Longitud: '15'
  Categorías: {}
