Nombre de la unidad económica:
  Descripción: 'Es el nombre comercial o nombre exterior con el que se identifica
    o anuncia la unidad económica.Generalmente es fácil reconocerlo porque está visible
    y escrito en rótulos, fachadas o anuncios luminosos. Ejemplo: ABARROTES LUPITA.Cuando
    la unidad económica no tiene ningún apelativo comercial, entonces se registra
    con el nombre genérico de la actividad o la descripción de la actividad económica,
    ejemplo: ABARROTES o Comercio al por menor en tiendas de abarrotes, ultramarinos
    y misceláneas.'
  Tipo: alfanumérico
  Longitud: '150'
  Categorías: {}
Razón social:
  Descripción: 'Es la denominación o el nombre con el que fue constituida legalmente
    la unidad económica como persona jurídica o moral (sociedad civil o mercantil).
    Es importante considerar que en algunas sociedades mercantiles, la razón social
    y el nombre comercial pueden ser los mismos. Ejemplo: GILSA, S.A. de C.V. Cuando
    la unidad económica pertenece a una persona física, el dato no se incluye para
    proteger la confidencialidad de la información. Directorio Estadístico Nacional
    de Unidades Económicas DESCRIPCIÓN DE ARCHIVOS Nombre de la columna en el archivo
    CSV Nombre de la columna en el archivo DBF Tipo de dato Longi tud Deci males Descripción
    Código de la clase'
  Tipo: alfanumérico
  Longitud: '110'
  Categorías: {}
Código de la clase de actividad:
  Descripción: La clasificación de las actividades desarrolladas por las unidades
    económicas debe hacerse utilizando el SCIAN y sus actualizaciones, con base en
    lo dispuesto en el acuerdo para el uso del SCIAN y en la recopilación, análisis
    y presentación de estadísticas económicas, publicado en el Diario Oficial de la
    Federación del 10 de julio de 2009. El código está asignado con base en la actividad
    principal que desarrolla la unidad económica y de acuerdo con el Sistema de Clasificación
    Industrial para América del Norte, versión 2018. Para la asignación del código
    de actividad correspondiente, según el SCIAN 2018, se consideraron tanto los productos
    (bienes y servicios) desarrollados por el establecimiento como sus procesos de
    producción.
  Tipo: alfanumérico
  Longitud: '6'
  Categorías: {}
Nombre de la clase de actividad:
  Descripción: Nombre del código de actividad conforme al SCIAN 2018.
  Tipo: alfanumérico
  Longitud: '250'
  Categorías: {}
Personal ocupado (estrato):
  Descripción: Comprende al personal contratado directamente por la razón social y
    al personal ajeno suministrado por otra razón social, que trabajó para la unidad
    económica, sujeto a su dirección y control y que cubrió, como mínimo, una tercera
    parte de la jornada laboral. Puede ser personal de planta, eventual remunerado
    o no remunerado. Las unidades económicas se clasifican por rangos de personal
    ocupado, que permiten identificar el tamaño de Unidades Económicas por el número
    de personal que emplean; es decir, según su personal ocupado total. Para el Directorio
    las Unidades Económicas están agrupadas en rangos o estratos de personal ocupado,
    con base en el personal ocupado total reportado por éstas, como se indica en la
    siguiente tabla. Personal Ocupado 1 = 0 a 5 2 = 6 a 10 3 = 11 a 30 4 = 31 a 50
    5 = 51 a 100 6 = 101 a 250 7 = 251 y más
  Tipo: alfanumérico
  Longitud: '20'
  Categorías:
    0 A 5 PERSONAS: 0 a 5 personas
    101 A 250 PERSONAS: 101 a 250 personas
    11 A 30 PERSONAS: 11 a 30 personas
    251 Y MAS PERSONAS: 251 y más personas
    31 A 50 PERSONAS: 31 a 50 personas
    51 A 100 PERSONAS: 51 a 100 personas
    6 A 10 PERSONAS: 6 a 10 personas
    NO ESPECIFICADO: No especificado
