    AGEM. Constituye la unidad básica del Marco Geoestadístico Nacional y, dependiendo
    de sus características, se clasifica en dos tipos, Áreas Geoestadísticas Básicas
    Urbanas y Áreas Geoestadísticas Básicas Rurales.
  Tipo: alfanumérico
  Longitud: '4'
  Categorías: {}
manzana:
