Tipo de unidad económica:
  Descripción: 'Grupo de categorías que sirve para identificar si el establecimiento
    es fijo o semifijo, bajo las siguientes definiciones: Establecimiento fijo: es
    la unidad que en una sola ubicación física, asentada en un lugar de manera permanente
    y delimitada por construcciones e instalaciones fijas, combina acciones y recursos
    bajo el control de una sola entidad propietaria o controladora para realizar alguna
    actividad económica con y sin fines de lucro, excepto las destinadas al autoconsumo.
    En este tipo de establecimiento están comprendidas las viviendas cuando en algún
    espacio de la casa-habitación, que también está destinado a otras actividades
    cotidianas, se realiza alguna actividad económica. Establecimiento semifijo: establecimientos
    que están fijos, enclavados en el suelo, y que permanecen de día y de noche en
    el mismo sitio aunque sus instalaciones sean frágiles o rústicas. También aquellas
    instalaciones que aun cuando no estén enclavadas al suelo no pueden ser removidas
    de donde están, aunque lleven a cabo actividades que tienen carácter temporal
    o estacional, siempre y cuando permanezcan activas y en un solo lugar durante
    un periodo de por lo menos tres meses seguidos.'
  Tipo: alfanumérico
  Longitud: '8'
  Categorías:
    M: M
    S: S
    U: U
