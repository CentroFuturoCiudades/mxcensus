ENTIDAD:
  Indicador: Clave de entidad federativa
  Descripción: Código que identifica a la entidad federativa. El código 00 identifica
    a los registros con los totales a nivel nacional.
  Rangos: 00…32
  Longitud: '2'
NOM_ENT:
  Indicador: Entidad federativa
  Descripción: Nombre oficial de la entidad federativa.
  Rangos: Alfanumérico
  Longitud: '50'
MUN:
  Indicador: Clave de municipio o demarcación territorial
  Descripción: Código que identifica al municipio o demarcación territorial al interior
    de una entidad federativa, conforme al Marco Geoestadístico. El código 000 identifica
    a los registros con los totales a nivel de entidad federativa.
  Rangos: 000…570
  Longitud: '3'
NOM_MUN:
  Indicador: Municipio o demarcación territorial
  Descripción: Nombre oficial del municipio o demarcación territorial en el caso de
    la Ciudad de México.
  Rangos: Alfanumérico
  Longitud: '50'
LOC:
  Indicador: Clave de localidad
  Descripción: Código que identifica a la localidad al interior de cada municipio
    o demarcación territorial conforme al Marco Geoestadístico. El código 0000 identifica
    a los registros con los totales a nivel de municipio o demarcación territorial.
  Rangos: 0000…9999
  Longitud: '4'
NOM_LOC:
  Indicador: Localidad
  Descripción: Nombre con el que se reconoce a la localidad dado por la ley o la costumbre.
  Rangos: Alfanumérico
  Longitud: '70'
LONGITUD:
  Indicador: Longitud
  Descripción: Ubicación de la localidad expresada en grados, minutos, segundos y
    milésimas de segundo. Las primeras tres o cuatro posiciones corresponden a los
    grados y su símbolo; las siguientes tres posiciones indican los minutos y su símbolo
    y las siguientes 8 posiciones corresponden a los segundos, sus milésimas separados
    por un punto y su símbolo, la última posición indica que es la longitud situada
    al Oeste del meridiano de Greenwich (W).
  Rangos: Caracter
  Longitud: '16'
LATITUD:
  Indicador: Latitud
  Descripción: Ubicación de la localidad expresada en grados, minutos, segundos y
    milésimas de segundo. Las primeras tres posiciones corresponden a los grados y
    su símbolo; las siguientes tres posiciones indican los minutos y su símbolo y
    las siguientes 8 posiciones corresponden a los segundos, sus milésimas separados
    por un punto y su símbolo, la última posición indica que es la latitud situada
    al norte del ecuador (N).
  Rangos: Caracter
  Longitud: '15'
ALTITUD:
  Indicador: Altitud
  Descripción: Altura a la que se encuentra una localidad, respecto al nivel medio
    del mar, expresada en metros.
  Rangos: Caracter
  Longitud: '4'
POBTOT:
  Indicador: Población total
  Descripción: Total de personas que residen habitualmente en el país, la entidad
    federativa, el municipio o la demarcación territorial y la localidad. Incluye
    la estimación del número de personas en viviendas particulares sin información
    de ocupantes. Incluye a la población que no especificó su edad.
  Rangos: 0...999999999
  Longitud: '9'
POBFEM:
  Indicador: Población femenina
  Descripción: Total de mujeres que residen habitualmente en el país, la entidad federativa,
    el municipio o la demarcación territorial y la localidad. Incluye la estimación
    del número de mujeres en viviendas particulares sin información de ocupantes.
    Incluye a la población que no especificó su edad.
  Rangos: 0...999999999
  Longitud: '9'
POBMAS:
  Indicador: Población masculina
  Descripción: Total de hombres que residen habitualmente en el país, la entidad federativa,
    el municipio o la demarcación territorial y la localidad. Incluye la estimación
    del número de hombres en viviendas particulares sin información de ocupantes.
    Incluye a la población que no especificó su edad.
  Rangos: 0...999999999
  Longitud: '9'
